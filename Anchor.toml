[toolchain]
anchor_version = "0.30.1"

[features]
seeds = true
skip-lint = false

# ── Program IDs ────────────────────────────────────────────────
# After `anchor deploy`, run: ts-node scripts/update-program-ids.ts
# to update these from target/deploy/*-keypair.json automatically.

[programs.localnet]
pool_program       = "4AXtXF5VWeWKLqP6vHKPpjoc7wQ8r4duDqZ4CENtzsqZ"
governance_program = "C1iFRYB3fw7Rq2i2JFruYLbJoGTxRb6ohYqerYBpUsLm"
info_pool_program  = "9MXoZpzQZzvURN1S1EARJLaDhFuGw3RAppQMYvGTcmPo"
routing_program    = "3fdt9Skkj52bMvutU56CuBMZhrUsaStXBxGNtDPVCRSG"

[programs.devnet]
pool_program       = "REPLACE_AFTER_DEPLOY_pool_program"
governance_program = "REPLACE_AFTER_DEPLOY_governance_program"
info_pool_program  = "REPLACE_AFTER_DEPLOY_info_pool_program"
routing_program    = "REPLACE_AFTER_DEPLOY_routing_program"

[programs.mainnet-beta]
pool_program       = "REPLACE_AFTER_DEPLOY_pool_program"
governance_program = "REPLACE_AFTER_DEPLOY_governance_program"
info_pool_program  = "REPLACE_AFTER_DEPLOY_info_pool_program"
routing_program    = "REPLACE_AFTER_DEPLOY_routing_program"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet  = "~/.config/solana/id.json"

[scripts]
test = "node_modules/.bin/ts-mocha -p ./tsconfig.json -t 1000000 'programs/**/tests/**/*.ts'"
